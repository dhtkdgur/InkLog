<!DOCTYPE HTML>
<html lang="ko">
<head>
  <title>감상문 상세 — Inklog</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Inklog 감상문 상세 보기 — 별점, 한줄평, 감상 기록을 확인하세요." />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/fontawesome-all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="assets/css/custom.css" />
</head>
<body class="is-preload">

  <div id="wrapper">

    <!-- Main -->
    <div id="main">
      <div class="inner">

        <!-- Header -->
        <header id="header">
          <a href="index.html" class="logo"><strong>Inklog</strong></a>
          <ul class="icons">
            <li><a href="list.html" class="icon solid fa-list" title="목록으로"><span class="label">목록</span></a></li>
          </ul>
        </header>

        <!-- Detail hero: cover + meta -->
        <div class="detail-hero">
          <div class="detail-cover">
            <img id="detail-cover-img" src="" alt="" />
          </div>
          <div class="detail-meta">
            <span id="detail-category" class="category-tag detail-category-tag"></span>
            <span id="detail-rewatch" class="rewatch-badge" style="display:none;">
              <i class="fa-solid fa-rotate-right" aria-hidden="true"></i> 재감상
            </span>
            <h1 id="detail-title"></h1>
            <p class="detail-creator" id="detail-creator"></p>
            <div id="detail-stars"></div>

            <!-- Meta: watchedAt, place, createdAt, length -->
            <div class="detail-meta-list">
              <span class="meta-item" id="detail-watchedat-group" style="display:none;">
                <i class="fa-regular fa-calendar" aria-hidden="true"></i>
                <span id="detail-watchedat"></span>
              </span>
              <span class="meta-item" id="detail-place-group" style="display:none;">
                <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
                <span id="detail-place"></span>
              </span>
              <span class="meta-item" id="detail-createdat-group" style="display:none;">
                <i class="fa-solid fa-pen" aria-hidden="true"></i>
                <span id="detail-createdat"></span>
              </span>
              <span class="meta-item" id="detail-length-group" style="display:none;">
                <i class="fa-solid fa-align-left" aria-hidden="true"></i>
                <span id="detail-length"></span>
              </span>
            </div>

            <blockquote class="detail-summary" id="detail-summary"></blockquote>
          </div>
        </div>

        <!-- 인용구 (book + quote 있을 때만) -->
        <div class="quote-block" id="quote-block" style="display:none;">
          <blockquote id="detail-quote"></blockquote>
        </div>

        <!-- 본문 -->
        <div class="detail-content" id="detail-content"></div>

        <!-- 태그 -->
        <div class="tags-area" id="detail-tags"></div>

        <!-- 하단 버튼 -->
        <div class="detail-actions">
          <a id="btn-edit" href="#" class="btn-primary">
            <i class="fa-solid fa-pen" aria-hidden="true"></i> 수정
          </a>
          <button id="btn-share" class="btn-secondary" type="button">
            <i class="fa-solid fa-link" aria-hidden="true"></i> 링크 복사
          </button>
          <button id="btn-delete" class="btn-danger" type="button">
            <i class="fa-solid fa-trash" aria-hidden="true"></i> 삭제
          </button>
          <a href="list.html" class="btn-secondary">
            <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> 목록으로
          </a>
        </div>

        <!-- 이전/다음 기록 네비게이션 -->
        <nav class="detail-nav" id="detail-nav" style="display:none;" aria-label="이전 다음 기록"></nav>

        <!-- 함께 보면 좋은 기록 (태그·카테고리 기반) -->
        <section class="related-section" id="related-section" style="display:none;">
          <div class="section-heading">
            <h2><i class="fa-solid fa-layer-group" aria-hidden="true"></i>함께 보면 좋은 기록</h2>
            <span class="section-line"></span>
          </div>
          <div class="cards-grid" id="related-grid"></div>
        </section>

      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="inner">

        <a href="index.html" class="inklog-logo">Ink<span>log</span></a>
        <span class="inklog-tagline">당신의 감상을, 잉크처럼 남기세요.</span>

        <nav id="menu">
          <header class="major"><h2>메뉴</h2></header>
          <ul>
            <li><a href="index.html"><i class="fa-solid fa-house" aria-hidden="true"></i> 홈</a></li>
            <li><a href="list.html"><i class="fa-solid fa-list" aria-hidden="true"></i> 전체 기록</a></li>
            <li>
              <span class="opener"><i class="fa-solid fa-layer-group" aria-hidden="true"></i> 카테고리</span>
              <ul>
                <li><a href="list.html?category=movie"><i class="fa-solid fa-film" aria-hidden="true"></i> 영화</a></li>
                <li><a href="list.html?category=book"><i class="fa-solid fa-book" aria-hidden="true"></i> 책</a></li>
                <li><a href="list.html?category=webtoon"><i class="fa-solid fa-tablet" aria-hidden="true"></i> 웹툰</a></li>
                <li><a href="list.html?category=etc"><i class="fa-solid fa-ellipsis" aria-hidden="true"></i> 기타</a></li>
              </ul>
            </li>
            <li><a href="tag.html"><i class="fa-solid fa-tags" aria-hidden="true"></i> 태그로 보기</a></li>
            <li><a href="gallery.html"><i class="fa-solid fa-images" aria-hidden="true"></i> 갤러리</a></li>
            <li><a href="about.html"><i class="fa-solid fa-circle-info" aria-hidden="true"></i> 소개</a></li>
            <li><a href="contact.html"><i class="fa-solid fa-envelope" aria-hidden="true"></i> 문의</a></li>
          </ul>
        </nav>

        <section>
          <a href="write.html" class="button primary sidebar-write-btn">
            <i class="fa-solid fa-pen-nib" aria-hidden="true"></i> 새 감상문 쓰기
          </a>
        </section>

        <footer id="footer">
          <p class="copyright">&copy; Inklog. Design based on <a href="https://html5up.net">HTML5 UP</a>.</p>
        </footer>

      </div>
    </div>

  </div>

  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/browser.min.js"></script>
  <script src="assets/js/breakpoints.min.js"></script>
  <script src="assets/js/util.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
