<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <rect width="300" height="420" fill="#1a1a2e"/>
  <!-- Comic panels -->
  <rect x="15" y="15" width="120" height="130" rx="4" fill="#16213e"/>
  <rect x="145" y="15" width="140" height="60" rx="4" fill="#16213e"/>
  <rect x="145" y="85" width="140" height="60" rx="4" fill="#16213e"/>
  <rect x="15" y="155" width="270" height="100" rx="4" fill="#16213e"/>
  <rect x="15" y="265" width="120" height="140" rx="4" fill="#16213e"/>
  <rect x="145" y="265" width="140" height="65" rx="4" fill="#16213e"/>
  <rect x="145" y="340" width="140" height="65" rx="4" fill="#16213e"/>
  <!-- Stars/action lines in panels -->
  <circle cx="75" cy="80" r="25" fill="#C0392B" opacity="0.4"/>
  <text x="75" y="86" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#C0392B">★</text>
  <!-- Speech bubble -->
  <ellipse cx="215" cy="45" rx="50" ry="18" fill="#C0392B" opacity="0.2" stroke="#C0392B" stroke-width="1.5"/>
  <text x="215" y="50" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F5F0EB">웹툰</text>
  <!-- Action in big panel -->
  <text x="150" y="215" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#C0392B" opacity="0.6">!</text>
  <text x="180" y="215" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#C0392B" opacity="0.4">!</text>
  <!-- Bottom panel -->
  <circle cx="75" cy="335" r="30" fill="none" stroke="#C0392B" stroke-width="2" opacity="0.5"/>
  <text x="75" y="341" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#C0392B" opacity="0.7">▶</text>
  <!-- Text -->
  <text x="150" y="408" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#F5F0EB">웹툰</text>
</svg>
