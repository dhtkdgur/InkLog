<!DOCTYPE HTML>
<html lang="ko">
<head>
  <title>문의 — Inklog</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Inklog에 대한 문의나 의견을 보내주세요." />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/fontawesome-all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="assets/css/custom.css" />
</head>
<body class="is-preload">

  <div id="wrapper">

    <!-- Main -->
    <div id="main">
      <div class="inner">

        <!-- Header -->
        <header id="header">
          <a href="index.html" class="logo"><strong>Inklog</strong></a>
          <ul class="icons">
            <li><a href="write.html" class="icon solid fa-pen-to-square" title="감상문 쓰기"><span class="label">글쓰기</span></a></li>
          </ul>
        </header>

        <!-- Page title -->
        <div class="page-title-bar">
          <h1><i class="fa-solid fa-envelope" aria-hidden="true"></i>문의</h1>
        </div>

        <!-- Contact links -->
        <section class="contact-links">
          <div class="contact-links-card">
            <a href="mailto:inklog@example.com">
              <i class="fa-solid fa-envelope" aria-hidden="true"></i>
              inklog@example.com
            </a>
            <a href="https://github.com/dhtkdgur/InkLog" target="_blank" rel="noopener noreferrer">
              <i class="fa-brands fa-github" aria-hidden="true"></i>
              github.com/dhtkdgur/InkLog
            </a>
          </div>
        </section>

        <!-- Contact form -->
        <section>
          <div class="section-heading">
            <h2>메시지 보내기</h2>
            <span class="section-line"></span>
          </div>

          <!-- Success message (hidden by default) -->
          <div class="contact-success" id="contact-success">
            <i class="fa-solid fa-circle-check"></i> 문의가 접수되었습니다. 빠른 시일 내에 답변 드리겠습니다.
          </div>

          <form id="contact-form" class="inklog-form" novalidate>

            <div class="form-group">
              <label for="c-name">이름 <span class="required">*</span></label>
              <input type="text" id="c-name" name="name" placeholder="홍길동" required />
            </div>

            <div class="form-group">
              <label for="c-email">이메일 <span class="required">*</span></label>
              <input type="text" id="c-email" name="email" placeholder="example@email.com" required />
            </div>

            <div class="form-group">
              <label for="c-subject">제목 <span class="required">*</span></label>
              <input type="text" id="c-subject" name="subject" placeholder="문의 제목을 입력해주세요." required />
            </div>

            <div class="form-group">
              <label for="c-message">내용 <span class="required">*</span></label>
              <textarea id="c-message" name="message" placeholder="문의 내용을 자유롭게 작성해주세요." required></textarea>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-primary">
                <i class="fa-solid fa-paper-plane"></i> 전송하기
              </button>
              <button type="reset" class="btn-secondary">
                <i class="fa-solid fa-rotate-left"></i> 초기화
              </button>
            </div>

          </form>
        </section>

      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="inner">

        <a href="index.html" class="inklog-logo">Ink<span>log</span></a>
        <span class="inklog-tagline">당신의 감상을, 잉크처럼 남기세요.</span>

        <nav id="menu">
          <header class="major"><h2>메뉴</h2></header>
          <ul>
            <li><a href="index.html"><i class="fa-solid fa-house"></i> 홈</a></li>
            <li><a href="list.html"><i class="fa-solid fa-list"></i> 전체 기록</a></li>
            <li>
              <span class="opener"><i class="fa-solid fa-layer-group"></i> 카테고리</span>
              <ul>
                <li><a href="list.html?category=movie"><i class="fa-solid fa-film"></i> 영화</a></li>
                <li><a href="list.html?category=book"><i class="fa-solid fa-book"></i> 책</a></li>
                <li><a href="list.html?category=webtoon"><i class="fa-solid fa-tablet"></i> 웹툰</a></li>
                <li><a href="list.html?category=etc"><i class="fa-solid fa-ellipsis"></i> 기타</a></li>
              </ul>
            </li>
            <li><a href="tag.html"><i class="fa-solid fa-tags"></i> 태그로 보기</a></li>
            <li><a href="gallery.html"><i class="fa-solid fa-images"></i> 갤러리</a></li>
            <li><a href="about.html"><i class="fa-solid fa-circle-info"></i> 소개</a></li>
            <li><a href="contact.html"><i class="fa-solid fa-envelope"></i> 문의</a></li>
          </ul>
        </nav>

        <section>
          <a href="write.html" class="button primary sidebar-write-btn">
            <i class="fa-solid fa-pen-nib" aria-hidden="true"></i> 새 감상문 쓰기
          </a>
        </section>

        <footer id="footer">
          <p class="copyright">&copy; Inklog. Design based on <a href="https://html5up.net">HTML5 UP</a>.</p>
        </footer>

      </div>
    </div>

  </div>

  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/browser.min.js"></script>
  <script src="assets/js/breakpoints.min.js"></script>
  <script src="assets/js/util.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var success = document.getElementById('contact-success');
      if (success) success.classList.add('show');
      this.reset();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
