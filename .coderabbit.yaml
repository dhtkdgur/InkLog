# ---------------------------------------------------------------- #
# AI 기본 설정
# ---------------------------------------------------------------- #

language: ko-KR

tone_instructions: >
  당신은 코드 품질과 안정성에 집중하는 경험 많은 소프트웨어 아키텍트입니다.

  리뷰의 목적은 잠재적인 문제를 조기에 발견하고 유지보수 비용을 줄이는 것입니다.

  리뷰 우선순위:

  1. 버그 가능성
  2. 예외 처리 누락
  3. 데이터 무결성 문제
  4. 보안 문제
  5. 테스트 누락
  6. 성능 문제
  7. 설계 문제
  8. 코드 스타일

  스타일 차이만 존재하는 경우 리뷰하지 마세요.

  중요도가 높은 문제를 우선적으로 리뷰하세요.

  각 리뷰에는 다음을 포함하세요.

  - 왜 문제인가?
  - 실제로 어떤 상황에서 문제가 발생하는가?
  - 어떻게 개선할 수 있는가?

  확실하지 않은 경우 단정하지 말고 가능성으로 표현하세요.

  칭찬은 짧고 구체적으로 작성하세요.

# ---------------------------------------------------------------- #
# 코드 리뷰 설정
# ---------------------------------------------------------------- #

reviews:
  profile: chill

  request_changes_workflow: false

  high_level_summary: true
  changed_files_summary: true

  sequence_diagrams: false

  assess_linked_issues: true
  related_issues: false
  related_prs: false

  suggested_labels: false
  auto_apply_labels: false

  suggested_reviewers: false
  auto_assign_reviewers: false

  poem: true

  review_status: true

  path_filters:
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/.next/**"
    - "!**/out/**"
    - "!**/generated/**"
    - "!**/*.generated.*"
    - "!**/*.snap"
    - "!**/vendor/**"
    - "!**/node_modules/**"

  path_instructions:

    - path: "**/test/**"
      instructions: |
        테스트 코드에서는 다음을 중점적으로 검토해주세요.

        - 테스트 이름이 의도를 명확하게 설명하는가
        - 정상 케이스와 실패 케이스가 모두 존재하는가
        - 경계값 테스트가 필요한가
        - 과도한 Mock 사용은 없는가
        - Given / When / Then 구조가 명확한가

    - path: "**/spec/**"
      instructions: |
        테스트 코드 관점에서 검토해주세요.

        - 누락된 테스트 케이스
        - 예외 상황 검증
        - 경계값 검증
        - 테스트 가독성

    - path: "**/controller/**"
      instructions: |
        API 진입 지점 관점에서 검토해주세요.

        - 입력 검증 누락
        - 예외 처리 누락
        - 상태 코드 적절성
        - 외부 입력 신뢰 여부
        - 보안 취약점 가능성

    - path: "**/api/**"
      instructions: |
        API 설계 관점에서 검토해주세요.

        - 입력 검증
        - 예외 처리
        - API 계약 일관성
        - 하위 호환성 문제

    - path: "**/service/**"
      instructions: |
        비즈니스 로직 관점에서 검토해주세요.

        - 예외 상황 누락
        - 복잡도 증가
        - 테스트 필요 여부
        - 트랜잭션 범위 문제
        - 동시성 문제 가능성

    - path: "**/domain/**"
      instructions: |
        도메인 모델 관점에서 검토해주세요.

        - 비즈니스 규칙 누락
        - 책임 분산 문제
        - 캡슐화 위반
        - 불변성 보장 여부

    - path: "**/repository/**"
      instructions: |
        데이터 접근 계층 관점에서 검토해주세요.

        - N+1 문제 가능성
        - 불필요한 조회
        - 트랜잭션 문제
        - 데이터 무결성 문제

    - path: "**"
      instructions: |
        다음 항목을 우선 검토해주세요.

        - Null 처리 누락
        - 예외 처리 누락
        - 리소스 누수 가능성
        - 동시성 문제
        - 보안 취약점
        - 성능 저하 가능성
        - 테스트 누락

        아래 상황이면 테스트 추가를 적극 제안해주세요.

        - 조건문 추가
        - 예외 처리 추가
        - 상태 변경 로직 추가
        - 계산 로직 추가
        - 외부 API 연동 추가

        단순 스타일 차이만 존재하는 경우 리뷰하지 마세요.

# ---------------------------------------------------------------- #
# 자동 리뷰
# ---------------------------------------------------------------- #

auto_review:
  enabled: false
  auto_incremental_review: false

# ---------------------------------------------------------------- #
# 채팅
# ---------------------------------------------------------------- #

chat:
  auto_reply: true

# ---------------------------------------------------------------- #
# Knowledge Base
# ---------------------------------------------------------------- #

knowledge_base:

  web_search:
    enabled: true

  learnings:
    scope: local

  issues:
    scope: local

  pull_requests:
    scope: local